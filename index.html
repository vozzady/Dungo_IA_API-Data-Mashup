<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>

    <style>
        body {
        font-family: Arial;
        max-width: 400px;
        margin: 50px auto;
        }

        input, select, button {
        width: 100%;
        padding: 10px;
        margin: 5px 0;
        }

        button {
        cursor: pointer;
        }

        h3 {
        margin-top: 32px;
        margin-bottom: 12px;
        }

        .status-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 24px;
        margin-top: 8px;
        }

        .spinner {
        width: 18px;
        height: 18px;
        border: 3px solid #d9d9d9;
        border-top-color: #222;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        display: none;
        }

        .spinner.active {
        display: inline-block;
        }

        #status {
        margin: 0;
        }

        .task-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 10px;
        }

        .task-card {
        border: 1px solid #d9d9d9;
        border-radius: 10px;
        padding: 14px;
        background: #fafafa;
        }

        .task-card strong {
        display: block;
        margin-bottom: 6px;
        }

        .task-meta {
        margin: 0;
        color: #555;
        font-size: 14px;
        }

        .task-list-status {
        color: #555;
        margin: 0 0 12px;
        }

        @keyframes spin {
        to {
            transform: rotate(360deg);
        }
        }
  </style>
</head>
<body>

    <h2>Task Manager</h2>

    <form method="post" id="taskForm">
        <label for="task">Task Name</label>
        <input name="task" id="task" type="text" placeholder="Enter task..." required/>

        <label for="priority"></label>
        <select name="priority" id="priority" required>
            <option value="">Select Priority</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
        </select>

        <button type="submit">Create Task</button>
    </form>

    <div class="status-wrap" aria-live="polite">
        <div id="spinner" class="spinner" aria-hidden="true"></div>
        <p id="status"></p>
    </div>

    <section>
        <h3>Task List</h3>
        <p id="taskListStatus" class="task-list-status">Loading tasks...</p>
        <ul id="taskList" class="task-list"></ul>
    </section>

    <script>
        const form = document.getElementById("taskForm");
        const statusText = document.getElementById("status");
        const spinner = document.getElementById("spinner");
        const submitButton = form.querySelector('button[type="submit"]');
        const taskList = document.getElementById("taskList");
        const taskListStatus = document.getElementById("taskListStatus");

        const setLoadingState = (isLoading, message = "") => {
            spinner.classList.toggle("active", isLoading);
            submitButton.disabled = isLoading;
            statusText.innerText = message;
        };

        const renderTasks = (tasks) => {
            taskList.innerHTML = "";

            if (!tasks.length) {
                taskListStatus.innerText = "No tasks yet. Create your first one above.";
                return;
            }

            taskListStatus.innerText = "";

            tasks.forEach((taskItem) => {
                const item = document.createElement("li");
                item.className = "task-card";

                const title = document.createElement("strong");
                title.textContent = taskItem.task;

                const priority = document.createElement("p");
                priority.className = "task-meta";
                priority.textContent = `Priority: ${taskItem.priority}`;

                const status = document.createElement("p");
                status.className = "task-meta";
                status.textContent = `Status: ${taskItem.status}`;

                item.append(title, priority, status);
                taskList.appendChild(item);
            });
        };

        const loadTasks = async () => {
            taskListStatus.innerText = "Loading tasks...";

            try {
                const res = await fetch("/api/tasks");
                const result = await res.json();

                if (!res.ok || !result.success) {
                    throw new Error(result.error || "Failed to load tasks.");
                }

                renderTasks(result.tasks || []);
            } catch (error) {
                taskList.innerHTML = "";
                taskListStatus.innerText = error.message || "Unable to load tasks.";
            }
        };

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const task = document.getElementById("task").value;
            const priority = document.getElementById("priority").value;

            setLoadingState(true, "Submitting...");

            try {
                const res = await fetch("/api/create-task", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ task, priority })
                });

                const result = await res.json();

                if (result.success) {
                    setLoadingState(false, "Task created successfully!");
                    form.reset();
                    await loadTasks();
                } else {
                    setLoadingState(false, result.error || "Failed to create task.");
                }
            } catch (error) {
                setLoadingState(false, "Server error. Check the backend logs.");
            }
        });

        loadTasks();
    </script>
</body>
</html>
